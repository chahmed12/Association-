<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration - Nouveautés</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Cairo', sans-serif;
        }
    </style>

</head>

<body class="bg-gray-100 min-h-screen p-8">
    <a href="/logout" class="text-red-500 hover:text-red-700 font-bold ml-4">
        Déconnexion (خروج)
    </a>
    <div class="max-w-2xl mx-auto">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
            <div class="bg-gradient-to-r from-purple-600 to-blue-600 p-6 text-center relative">
                <a href="/admin.html" class="absolute left-4 top-4 text-white/80 hover:text-white font-bold text-sm">
                    ← Retour Dashboard
                </a>
                <h1 class="text-white text-3xl font-bold">Administration</h1>
                <p class="text-purple-100 text-sm mt-1">Ajouter une nouveauté</p>
            </div>

            <div class="p-8">
                <form id="adminForm" class="space-y-6" enctype="multipart/form-data">

                    <div>
                        <label for="titre" class="block text-gray-700 font-semibold mb-2">
                            Titre de la nouveauté
                        </label>
                        <input type="text" id="titre" name="titre"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition duration-200"
                            placeholder="Ex: Événement culturel 2026">
                    </div>

                    <div>
                        <label for="image" class="block text-gray-700 font-semibold mb-2">
                            Image *
                        </label>
                        <div
                            class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center hover:border-purple-500 transition duration-200">
                            <input type="file" id="image" name="image" accept="image/*" required class="hidden"
                                onchange="previewImage(event)">
                            <label for="image" class="cursor-pointer">
                                <div id="imagePreview" class="hidden mb-4">
                                    <img id="preview" class="max-h-64 mx-auto rounded-lg shadow-md">
                                </div>
                                <div id="uploadPrompt">
                                    <svg class="w-12 h-12 text-gray-400 mx-auto mb-2" fill="none" stroke="currentColor"
                                        viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12">
                                        </path>
                                    </svg>
                                    <p class="text-gray-600 font-semibold">Cliquez pour sélectionner une image</p>
                                    <p class="text-gray-400 text-sm mt-1">PNG, JPG, GIF jusqu'à 10MB</p>
                                </div>
                            </label>
                        </div>
                    </div>

                    <button type="submit" id="submitBtn"
                        class="w-full bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-700 hover:to-blue-700 text-white font-bold py-3 rounded-lg shadow-md hover:shadow-lg transition duration-300 transform hover:-translate-y-1">
                        Ajouter la nouveauté
                    </button>
                </form>

                <div id="successMessage"
                    class="hidden mt-6 bg-green-50 border border-green-200 rounded-lg p-4 text-center">
                    <svg class="w-12 h-12 text-green-500 mx-auto mb-2" fill="none" stroke="currentColor"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <h3 class="text-lg font-bold text-green-800">Nouveauté ajoutée avec succès!</h3>
                    <button onclick="resetForm()"
                        class="mt-4 bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-6 rounded-lg transition duration-300">
                        Ajouter une autre
                    </button>
                </div>

                <div id="errorMessage" class="hidden mt-6 bg-red-50 border border-red-200 rounded-lg p-4 text-center">
                    <p class="text-red-600 font-bold">Erreur lors de l'ajout. Veuillez réessayer.</p>
                </div>
            </div>
        </div>

        <!-- Section Galerie -->
        <div class="mt-10 bg-white rounded-2xl shadow-xl overflow-hidden">
            <div class="bg-gray-50 border-b border-gray-200 p-6 flex justify-between items-center">
                <div>
                    <h2 class="text-xl font-bold text-gray-800">Images existantes</h2>
                    <p class="text-sm text-gray-500 mt-1">Gérer et supprimer les nouveautés publiées</p>
                </div>
                <button onclick="loadGallery()" class="text-purple-600 hover:text-purple-800" title="Rafraîchir">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </button>
            </div>
            <div class="p-6">
                <div id="galleryGrid" class="grid grid-cols-2 md:grid-cols-3 gap-6">
                    <p class="text-gray-500 col-span-full text-center py-8">Chargement des images...</p>
                </div>
            </div>
        </div>

        <div class="mt-6 text-center">
            <a href="/" class="text-purple-600 hover:text-purple-800 font-semibold">← Retour à l'accueil</a>
            <span class="mx-4 text-gray-400">|</span>
            <a href="/nouveautes.html" class="text-purple-600 hover:text-purple-800 font-semibold">Voir les nouveautés
                →</a>
        </div>
    </div>

    <script>
        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    document.getElementById('preview').src = e.target.result;
                    document.getElementById('imagePreview').classList.remove('hidden');
                    document.getElementById('uploadPrompt').classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        function resetForm() {
            document.getElementById('adminForm').reset();
            document.getElementById('imagePreview').classList.add('hidden');
            document.getElementById('uploadPrompt').classList.remove('hidden');
            document.getElementById('successMessage').classList.add('hidden');
            document.getElementById('adminForm').classList.remove('hidden');
        }

        document.getElementById('adminForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerText;

            btn.disabled = true;
            btn.innerText = "Envoi en cours...";
            btn.classList.add('opacity-75', 'cursor-not-allowed');

            const formData = new FormData();
            formData.append('titre', document.getElementById('titre').value);
            formData.append('image', document.getElementById('image').files[0]);

            try {
                const response = await fetch('/api/nouveautes', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    document.getElementById('adminForm').classList.add('hidden');
                    document.getElementById('successMessage').classList.remove('hidden');
                    loadGallery(); // Mettre à jour la galerie
                } else {
                    document.getElementById('errorMessage').classList.remove('hidden');
                }
            } catch (error) {
                console.error('Erreur:', error);
                document.getElementById('errorMessage').classList.remove('hidden');
            } finally {
                if (!document.getElementById('adminForm').classList.contains('hidden')) {
                    btn.disabled = false;
                    btn.innerText = originalText;
                    btn.classList.remove('opacity-75', 'cursor-not-allowed');
                }
            }
        });

        async function loadGallery() {
            const grid = document.getElementById('galleryGrid');
            try {
                const res = await fetch('/api/nouveautes');
                const data = await res.json();
                
                if (data.success && data.images && data.images.length > 0) {
                    grid.innerHTML = data.images.map(img => `
                        <div class="relative group rounded-xl overflow-hidden border border-gray-200 shadow-sm hover:shadow-md transition-shadow">
                            <img src="${img.url}" alt="${img.titre || 'Image'}" class="w-full h-40 object-cover">
                            <div class="p-3 bg-white">
                                <p class="text-sm font-semibold text-gray-800 truncate">${img.titre || 'Sans titre'}</p>
                                <p class="text-xs text-gray-500 mt-1">${new Date(img.date).toLocaleDateString()}</p>
                            </div>
                            <div class="absolute inset-0 bg-black/60 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                                <button onclick="deleteImage(${img.id})" class="bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded-lg flex items-center gap-2 transform hover:scale-105 transition-all shadow-lg">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                    Supprimer
                                </button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    grid.innerHTML = '<p class="text-gray-500 col-span-full text-center py-8">Aucune image enregistrée.</p>';
                }
            } catch (error) {
                console.error("Erreur chargement galerie:", error);
                grid.innerHTML = '<p class="text-red-500 col-span-full text-center py-4">Erreur lors du chargement des images.</p>';
            }
        }

        async function deleteImage(id) {
            if (!confirm("Voulez-vous vraiment supprimer cette image définitivement ?\\n(Elle sera supprimée de la base de données et du serveur d'images)")) return;
            
            try {
                const res = await fetch(\`/api/nouveautes/\${id}\`, { method: 'DELETE' });
                const data = await res.json();
                
                if (data.success) {
                    loadGallery(); // Recharger la galerie après suppression
                } else {
                    alert("Erreur: " + (data.message || "Impossible de supprimer l'image"));
                }
            } catch (error) {
                console.error("Erreur suppression:", error);
                alert("Erreur lors de la suppression");
            }
        }

        // Charger la galerie au démarrage
        document.addEventListener('DOMContentLoaded', loadGallery);
    </script>
</body>

</html>
